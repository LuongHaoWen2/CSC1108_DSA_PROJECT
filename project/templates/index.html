<!DOCTYPE html>
<html>
<head>
    <title>Flight Route Finder</title>

    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <!-- jQuery (Select2 + AJAX dependency) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        body { margin:0; font-family: Arial, sans-serif; }
        .container { display: flex; height: 100vh; }
        .map { flex: 2; }
        .controls { flex: 1; padding: 20px; background: #f2f2f2; overflow-y: auto; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        select, input, button { width: 100%; padding: 8px; margin-top: 5px; }
        h2 { margin-top: 0; }
        .results { margin-top: 20px; background: #fff; padding: 10px; border-radius: 5px; }
        ul { padding-left: 20px; }
        .route-btn { margin-bottom: 5px; width: 100%; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <div class="map">
            {{ map_html|safe }}
        </div>
        <div class="controls">
            <h2>Flight Route Map Directory</h2>
            <form method="POST" id="searchForm">
                <label for="origin">Origin Airport:</label>
                <select name="origin" class="searchable">
                    <option value="">Select Origin</option>
                    {% for code, name in all_airports %}
                        <option value="{{ code }}" {% if code == selected_origin %}selected{% endif %}>{{ name }}</option>
                    {% endfor %}
                </select>

                <label for="destination">Destination Airport:</label>
                <select name="destination" class="searchable">
                    <option value="">Select Destination</option>
                    {% for code, name in all_airports %}
                        <option value="{{ code }}" {% if code == selected_destination %}selected{% endif %}>{{ name }}</option>
                    {% endfor %}
                </select>

                <label for="preference">Route Preference:</label>
                <select name="preference">
                    <option value="shortest" {% if route_preference=="shortest" %}selected{% endif %}>Shortest Distance</option>
                    <option value="cheapest" {% if route_preference=="cheapest" %}selected{% endif %}>Lowest Price</option>
                    <option value="fewest" {% if route_preference=="fewest" %}selected{% endif %}>Fewest Stops</option>
                    <option value="cost-effective" {% if route_preference=="cost-effective" %}selected{% endif %}>Most Cost-Effective</option>
                </select>

                <label for="max_stops">Max Stops (optional):</label>
                <input type="number" name="max_stops" value="{{ max_stops }}" min="1" max="4">

                <button type="submit">Find Route</button>
            </form>

            {% if route_info %}
                <div class="results">
                    <h3>Route Info:</h3>
                    <p>{{ route_info }}</p>

                    {% if all_routes %}
                        <h4>All Routes:</h4>
                        <ul>
                            {% for route in all_routes %}
                                <li>
                                    <button class="route-btn" 
                                            data-index="{{ loop.index0 }}"
                                            data-origin="{{ selected_origin }}"
                                            data-destination="{{ selected_destination }}"
                                            data-max-stops="{{ max_stops }}">
                                        {{ route | join(" → ") }}
                                    </button>
                                </li>
                            {% endfor %}
                        </ul>
                    {% endif %}
                </div>
            {% endif %}
        </div>
    </div>

    <!-- Initialize Select2 and AJAX for clickable routes -->
    <script>
    $(document).ready(function() {
        // Make dropdowns searchable
        $('.searchable').select2({
            placeholder: "Type to search",
            width: '100%'
        });

        // AJAX for clickable route buttons
        $('.route-btn').click(function() {
            let index = $(this).data('index');
            let origin = $(this).data('origin');
            let destination = $(this).data('destination');
            let max_stops = $(this).data('max-stops');

            $.ajax({
                url: '/update_map',
                type: 'POST',
                data: {
                    route_index: index,
                    origin: origin,
                    destination: destination,
                    max_stops: max_stops
                },
                success: function(response) {
                    // Replace map div with new map HTML
                    $('.map').html(response.map_html);
                }
            });
        });
    });
    </script>
</body>
</html>
